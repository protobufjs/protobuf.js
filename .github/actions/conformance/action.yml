name: "Run protobuf conformance"
description: "Build and run the upstream Protocol Buffers conformance suite for protobuf.js."
inputs:
  upstream-version:
    description: "Upstream protocolbuffers/protobuf tag or branch to test against."
    default: "v35.0"
  upstream-dir:
    description: "Directory where upstream protobuf is checked out."
    default: "tests/conformance/upstream"
  runner-cache:
    description: "Directory used to cache the built upstream conformance runner."
    default: "tests/conformance/runner-cache"
  output-dir:
    description: "Directory where conformance logs and generated reports are written."
    default: "tests/conformance/out"
  maximum-edition:
    description: "Maximum protobuf edition passed to the conformance runner."
    default: "2024"
outputs:
  exit-code:
    description: "Exit code returned by the conformance suites."
    value: ${{ steps.run-conformance.outputs.exit_code }}
runs:
  using: "composite"
  steps:
    - name: "Prepare conformance runner cache"
      shell: bash
      run: mkdir -p "${{ inputs.runner-cache }}"

    - uses: actions/cache@v5
      id: conformance-runner-cache
      with:
        path: ${{ inputs.runner-cache }}
        key: protobuf-conformance-runner-protoc-${{ runner.os }}-${{ inputs.upstream-version }}

    - name: "Check out upstream protobuf"
      shell: bash
      run: git clone --depth 1 --branch "${{ inputs.upstream-version }}" https://github.com/protocolbuffers/protobuf.git "${{ inputs.upstream-dir }}"

    - name: "Install build dependencies"
      if: steps.conformance-runner-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: "Build upstream conformance runner"
      if: steps.conformance-runner-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cmake -S "${{ inputs.upstream-dir }}" -B "${{ inputs.runner-cache }}/build" -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -Dprotobuf_BUILD_CONFORMANCE=ON \
          -Dprotobuf_BUILD_TESTS=OFF \
          -Dprotobuf_BUILD_EXAMPLES=OFF \
          -Dprotobuf_INSTALL=OFF \
          -Dprotobuf_FORCE_FETCH_DEPENDENCIES=ON
        cmake --build "${{ inputs.runner-cache }}/build" --target conformance_test_runner protoc --parallel 2

    - name: "Generate protobuf.js conformance target"
      shell: bash
      env:
        PROTOBUF_UPSTREAM: ${{ inputs.upstream-dir }}
        PROTOC: ${{ inputs.runner-cache }}/build/protoc
      run: node tests/conformance/generate.js

    - name: "Locate Node.js"
      id: node
      shell: bash
      run: echo "path=$(command -v node)" >> "$GITHUB_OUTPUT"

    - name: "List conformance tests"
      shell: bash
      run: |
        mkdir -p "${{ inputs.output-dir }}"
        : > "${{ inputs.output-dir }}/failure_list.txt"
        PROTOBUFJS_CONFORMANCE_MODE=reflect \
        "${{ inputs.runner-cache }}/build/conformance_test_runner" \
          --maximum_edition "${{ inputs.maximum-edition }}" \
          --enforce_recommended \
          --verbose \
          --failure_list "${{ inputs.output-dir }}/failure_list.txt" \
          --output_dir "${{ inputs.output-dir }}" \
          "${{ steps.node.outputs.path }}" tests/conformance/testee.js --list \
          > "${{ inputs.output-dir }}/conformance-tests.log" 2>&1

    - name: "Run conformance suites"
      id: run-conformance
      shell: bash
      run: |
        status=0

        run_mode() {
          local mode="$1"
          local mode_dir="${{ inputs.output-dir }}/${mode}"
          local mode_status=0

          mkdir -p "$mode_dir"
          : > "$mode_dir/failure_list.txt"

          set +e
          PROTOBUFJS_CONFORMANCE_MODE="$mode" \
          "${{ inputs.runner-cache }}/build/conformance_test_runner" \
            --maximum_edition "${{ inputs.maximum-edition }}" \
            --enforce_recommended \
            --verbose \
            --failure_list "$mode_dir/failure_list.txt" \
            --output_dir "$mode_dir" \
            "${{ steps.node.outputs.path }}" tests/conformance/testee.js \
            > "$mode_dir/conformance.log" 2>&1
          mode_status=$?
          set -e

          if [ "$mode_status" -ne 0 ]; then
            status="$mode_status"
          fi

          echo ""
          echo "Last conformance log lines for ${mode} mode:"
          tail -n 80 "$mode_dir/conformance.log"
          if [ -s "$mode_dir/failing_tests.txt" ]; then
            echo ""
            echo "Failing conformance tests for ${mode} mode:"
            cat "$mode_dir/failing_tests.txt"
          fi
        }

        run_optional_mode() {
          local mode="$1"
          local artifact="tests/conformance/generated/${mode}/messages.js"
          if [ -f "$artifact" ]; then
            run_mode "$mode"
          else
            echo ""
            echo "Skipping ${mode} mode because ${artifact} was not generated."
          fi
        }

        run_mode static
        run_optional_mode static-plugin
        run_mode reflect
        run_optional_mode reflect-plugin

        echo "exit_code=$status" >> "$GITHUB_OUTPUT"

    - name: "Summarize static conformance results"
      if: always()
      shell: bash
      run: |
        {
          echo "## Static"
          echo ""
          node tests/conformance/report.js "${{ inputs.output-dir }}/static/conformance.log" "${{ inputs.output-dir }}/conformance-tests.log" --binary-only --json "${{ inputs.output-dir }}/static/conformance.json"
        } | tee -a "$GITHUB_STEP_SUMMARY"

    - name: "Summarize static-plugin conformance results"
      if: always()
      shell: bash
      run: |
        {
          echo "## Static Plugin"
          echo ""
          if [ -f "${{ inputs.output-dir }}/static-plugin/conformance.log" ]; then
            node tests/conformance/report.js "${{ inputs.output-dir }}/static-plugin/conformance.log" "${{ inputs.output-dir }}/conformance-tests.log" --binary-only --json "${{ inputs.output-dir }}/static-plugin/conformance.json"
          else
            echo "No conformance log found."
          fi
        } | tee -a "$GITHUB_STEP_SUMMARY"

    - name: "Summarize reflect conformance results"
      if: always()
      shell: bash
      run: |
        {
          echo "## Reflect"
          echo ""
          node tests/conformance/report.js "${{ inputs.output-dir }}/reflect/conformance.log" "${{ inputs.output-dir }}/conformance-tests.log" --json "${{ inputs.output-dir }}/reflect/conformance.json"
        } | tee -a "$GITHUB_STEP_SUMMARY"

    - name: "Summarize reflect-plugin conformance results"
      if: always()
      shell: bash
      run: |
        {
          echo "## Reflect Plugin"
          echo ""
          if [ -f "${{ inputs.output-dir }}/reflect-plugin/conformance.log" ]; then
            node tests/conformance/report.js "${{ inputs.output-dir }}/reflect-plugin/conformance.log" "${{ inputs.output-dir }}/conformance-tests.log" --json "${{ inputs.output-dir }}/reflect-plugin/conformance.json"
          else
            echo "No conformance log found."
          fi
        } | tee -a "$GITHUB_STEP_SUMMARY"

    - name: "Summarize conformance runner"
      if: always()
      shell: bash
      run: |
        {
          echo ""
          echo "---"
          echo ""
          if [ -d "${{ inputs.upstream-dir }}/.git" ]; then
            echo "Conformance runner: protocolbuffers/protobuf \`${{ inputs.upstream-version }}\` (\`$(git -C "${{ inputs.upstream-dir }}" rev-parse --short HEAD)\`)"
          else
            echo "Conformance runner: protocolbuffers/protobuf \`${{ inputs.upstream-version }}\`"
          fi
          if [ -x "${{ inputs.runner-cache }}/build/protoc" ]; then
            echo "Protoc: \`$("${{ inputs.runner-cache }}/build/protoc" --version)\`"
          else
            echo "Protoc: unavailable"
          fi
          echo "Options: \`--maximum_edition ${{ inputs.maximum-edition }} --enforce_recommended\`"
        } | tee -a "$GITHUB_STEP_SUMMARY"
